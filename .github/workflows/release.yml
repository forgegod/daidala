name: release-gate

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e '.[dev]'
      - name: Verify source and documentation
        run: |
          python scripts/check_release_contents.py .
          python scripts/check_md_links.py .
          ruff check .
          pytest
          daidala packs validate addyosmani
          daidala packs validate aidlc

  package:
    name: Package and dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pip-audit
          python -m build
          python -m twine check dist/*
      - name: Inspect release contents
        run: python scripts/check_release_contents.py . --wheel dist/*.whl
      - name: Isolated wheel install and runtime audit
        run: |
          python -m venv /tmp/daidala-release
          /tmp/daidala-release/bin/pip install --upgrade pip
          /tmp/daidala-release/bin/pip install dist/*.whl pip-audit
          /tmp/daidala-release/bin/daidala packs validate addyosmani
          /tmp/daidala-release/bin/daidala packs validate aidlc
          /tmp/daidala-release/bin/pip-audit --local
      - name: Upload exact checked distribution
        uses: actions/upload-artifact@v6
        with:
          name: daidala-dist
          path: dist/
          if-no-files-found: error

  hermes-compatibility:
    name: Supported Hermes compatibility
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    needs: [test, package]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - uses: actions/download-artifact@v6
        with:
          name: daidala-dist
          path: dist
      - name: Install pinned Hermes host
        run: |
          git clone https://github.com/NousResearch/hermes-agent.git /tmp/hermes-v0182-source
          git -C /tmp/hermes-v0182-source checkout 4281151ae859241351ba14d8c7682dc67ff4c126
          git -C /tmp/hermes-v0182-source update-ref refs/remotes/origin/main 4281151ae859241351ba14d8c7682dc67ff4c126
          git -C /tmp/hermes-v0182-source remote set-url origin file:///tmp/hermes-v0182-pinned-origin
          git clone https://github.com/NousResearch/hermes-agent.git /tmp/hermes-v0190-source
          git -C /tmp/hermes-v0190-source checkout 3ef6bbd201263d354fd83ec55b3c306ded2eb72a
          git -C /tmp/hermes-v0190-source update-ref refs/remotes/origin/main 3ef6bbd201263d354fd83ec55b3c306ded2eb72a
          git -C /tmp/hermes-v0190-source remote set-url origin file:///tmp/hermes-v0190-pinned-origin
          (cd /tmp/hermes-v0182-source && npm ci --workspace web && npm run build -w web)
          (cd /tmp/hermes-v0190-source && npm ci --workspace web && npm run build -w web)
          python -m pip install --upgrade pip
          python -m pip install twine
          python -m venv /tmp/hermes-v0182
          /tmp/hermes-v0182/bin/pip install --upgrade pip
          /tmp/hermes-v0182/bin/pip install /tmp/hermes-v0182-source
          v0182_purelib="$(/tmp/hermes-v0182/bin/python -c 'import sysconfig; print(sysconfig.get_path("purelib"))')"
          printf '%s\n' 4281151ae859241351ba14d8c7682dc67ff4c126 > "$v0182_purelib/.hermes_build_sha"
          python -m venv /tmp/hermes-v0190
          /tmp/hermes-v0190/bin/pip install --upgrade pip
          /tmp/hermes-v0190/bin/pip install /tmp/hermes-v0190-source
          v0190_purelib="$(/tmp/hermes-v0190/bin/python -c 'import sysconfig; print(sysconfig.get_path("purelib"))')"
          printf '%s\n' 3ef6bbd201263d354fd83ec55b3c306ded2eb72a > "$v0190_purelib/.hermes_build_sha"
      - name: Probe exact wheel on supported Hermes boundary
        run: |
          mapfile -t wheels < <(printf '%s\n' dist/*.whl)
          test "${#wheels[@]}" -eq 1
          wheel="${wheels[0]}"
          wheel_sha256="$(sha256sum "$wheel" | cut -d' ' -f1)"
          python -m pip install "$wheel"
          python scripts/run_hermes_support_matrix.py \
            --wheel "$wheel" \
            --expected-wheel-sha256 "$wheel_sha256" \
            --host supported-v0182 0.18.2 2026.7.7.2 4281151a \
              /tmp/hermes-v0182/bin/python 9120 \
            --host supported-v0190 0.19.0 2026.7.20 3ef6bbd2 \
              /tmp/hermes-v0190/bin/python 9130
